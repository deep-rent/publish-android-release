name: Build

on:
  workflow_dispatch: {}
  pull_request:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - '.vscode/**'
      - 'scripts/**'
      - 'README.md'
      - 'LICENSE'
  # push:
  #   branches:
  #     - main

permissions:
  contents: write

jobs:
  build:
    name: TypeScript Tests and Compilation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Check Format
        run: npm run format:check

      - name: Lint Code
        run: npm run lint

      - name: Execute Tests
        run: npm run test

      - name: Transpile Code
        run: |
          npm run build

      - name: Report Coverage
        run: |
          npm run coverage

      - name: Commit Transpiled Output
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: update transpiled output'
          file_pattern: 'dist/index.js'

      - name: Commit Coverage Badge
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: update coverage badge'
          file_pattern: '.github/assets/coverage.svg'
