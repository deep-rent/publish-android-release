name: Build

on:
  workflow_dispatch: {}
  pull_request:
    branches:
      - main
  # push:
  #   branches:
  #     - main

permissions:
  contents: write

jobs:
  build:
    name: TypeScript Tests and Compilation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Check Format
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Transpile
        run: |
          npm run build

      - name: Coverage
        run: |
          npm run coverage

      - name: Auto-commit Package and Coverage
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: update transpiled output and coverage badge'
          file_pattern: 'dist/index.js .github/assets/coverage.svg'
