name: Build

on:
  pull_request:
    branches:
      - main
  # push:
  #   branches:
  #     - main

permissions:
  contents: write

jobs:
  build:
    name: TypeScript Tests and Compilation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Check Format
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Package
        run: |
          npm run package

      - name: Coverage
        run: |
          npm run coverage

      - name: Auto-commit Package
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: update transpiled output'
          file_pattern: 'dist/index.js'

      - name: Auto-commit Coverage Badge
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: update coverage badge'
          file_pattern: '.github/assets/coverage.svg'

  test-action:
    name: GitHub Actions Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Test Local Action
        id: test-action
        uses: ./
        with:
          milliseconds: 2000

      - name: Print Output
        run: echo "${{ steps.test-action.outputs.time }}"
