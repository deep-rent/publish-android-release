name: Verify

on:
  pull_request:
    branches:
      - main
  # push:
  #   branches:
  #     - main

permissions:
  contents: read

jobs:
  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: npm-ci
        run: npm ci

      - name: Check Format
        id: npm-format-check
        run: npm run format:check

      - name: Lint
        id: npm-lint
        run: npm run lint

      - name: Test
        id: npm-test
        run: npm run test

      - name: Build and Update Coverage Badge
        id: npm-build-coverage
        run: |
          npm run package
          npm run coverage

      - name: Verify No Uncommitted Changes
        id: verify-changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "❌ Outdated 'dist/index.js' or '.github/assets/coverage.svg' detected!"
            echo "Please run 'npm run package' and 'npm run coverage' locally, commit the changes, and push again."
            git status --porcelain
            exit 1
          fi

  test-action:
    name: GitHub Actions Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Test Local Action
        id: test-action
        uses: ./
        with:
          milliseconds: 2000

      - name: Print Output
        id: output
        run: echo "${{ steps.test-action.outputs.time }}"
