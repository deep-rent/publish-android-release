# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: Publish Android Release
description: Builds, signs, and uploads an Android release artifact to the Google Play Console
author: deep.rent GmbH

branding:
  icon: upload
  color: green

inputs:
  project-directory:
    description: 'Path to the root Android project directory containing the gradlew executable.'
    required: true
    default: '.'
  keystore:
    description: 'Base64-encoded string representation of your Android release keystore (e.g., .jks or .keystore) file.'
    required: true
  keystore-password:
    description: 'The password required to unlock the Android keystore.'
    required: true
  key-alias:
    description: 'The alias of the signing key stored within the keystore.'
    required: true
  key-password:
    description: 'The password for the specific signing key alias. Defaults to the keystore password.'
    required: false
  service-account:
    description: 'Base64-encoded string representation of the Google Cloud Service Account JSON used to authenticate with the Google Play Developer API.'
    required: true
  package-name:
    description: 'The application ID (package name) of the Android app (e.g., com.example.app).'
    required: true
  release-file:
    description: 'The relative path to the generated Android App Bundle (AAB) file.'
    required: true
    default: 'app/build/outputs/bundle/release/app-release.aab'
  mapping-file:
    description: 'The relative path to the generated ProGuard/R8 mapping.txt file.'
    required: true
    default: 'app/build/outputs/mapping/release/mapping.txt'
  track:
    description: 'The Google Play track to publish the release to. Valid options are: internal, alpha, beta, production.'
    required: true
    default: 'internal'
  status:
    description: 'The status of the release. Valid options are: completed, draft, halted, inProgress.'
    required: true
    default: 'completed'
outputs:
  version-code:
    description: 'The assigned version code of the successfully uploaded Android App Bundle (AAB).'
  aab-path:
    description: 'The absolute local path to the generated and signed Android App Bundle (AAB) file.'

runs:
  using: node24
  main: dist/index.js
