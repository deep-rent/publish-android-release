# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: Publish Android Release
description: Uploads an Android release artifact to the Google Play Console
author: deep.rent GmbH

branding:
  icon: upload
  color: green

inputs:
  project-directory:
    description: 'Path to the Android folder containing gradlew'
    required: true
    default: '.'
  keystore:
    description: 'Base64 encoded keystore file'
    required: true
  keystore-password:
    description: 'Keystore password'
    required: true
  key-alias:
    description: 'Key alias'
    required: true
  key-password:
    description: 'Key password'
    required: true
  service-account:
    description: 'The plain text of the service account JSON'
    required: true
  package-name:
    description: 'The package name of the app'
    required: true
  track:
    description: 'The track to promote to'
    required: true
    default: 'internal'
  status:
    description: 'Release status (e.g., completed, draft, halted, inProgress)'
    required: true
    default: 'completed'
outputs:
  version-code:
    description: 'The version code of the uploaded release'
  aab-path:
    description: 'The local path to the generated AAB file'

runs:
  using: node24
  main: dist/index.js
